<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miss-Woo - WooCommerce Integration (Development)</title>
                <link rel="stylesheet" href="src/styles.css?v=2015" />
            <script src="https://missive.com/iframe.js"></script>
          </head>
          <body>
            <div id="app">
              <header class="app-header">
                <h1>Miss-Woo (Development)</h1>
                <p class="subtitle">WooCommerce Integration</p>
              </header>

              <main class="app-content">
                <div class="search-section">
                  <input
                    type="text"
                    id="orderSearch"
                    placeholder="Search orders by ID or customer email..."
                    class="search-input"
                  />
                  <button id="searchBtn" class="search-btn">Search</button>
                </div>

                <div class="results-section">
                  <div id="loading" class="loading hidden">Loading...</div>
                  <div id="error" class="error hidden"></div>
                  <div id="results" class="results-container"></div>
                </div>
              </main>
            </div>

            <script src="src/config.js?v=2015"></script>
            <script type="module" src="src/app.js?v=2015"></script>
  </body>
</html>
